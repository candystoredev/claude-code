<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Variant Sync Tool{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/">Variant Sync Tool</a></h1>
            <p class="subtitle">Sync Shopify variants with distributor product offerings</p>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="container">
            <p>Variant Sync Tool &mdash; Internal Use</p>
        </div>
    </footer>
</body>
</html>
