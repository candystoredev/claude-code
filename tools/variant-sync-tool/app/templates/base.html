<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Variant Sync Tool{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div class="container header-row">
            <div>
                <h1><a href="/">Variant Sync Tool</a></h1>
                <p class="subtitle">Sync Shopify variants with distributor product offerings</p>
            </div>
            <nav>
                <a href="/">Sync</a>
                <a href="/guide">How to Use</a>
                <a href="/changelog">Changelog</a>
            </nav>
        </div>
    </header>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <footer>
        <div class="container">
            <p>Variant Sync Tool &mdash; Internal Use</p>
        </div>
    </footer>
</body>
</html>
