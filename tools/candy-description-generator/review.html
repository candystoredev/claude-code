<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Description Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }

  .header { background: #1a1a2e; color: #fff; padding: 20px 32px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 13px; color: #aaa; margin-top: 4px; }

  .controls { display: flex; align-items: center; gap: 16px; padding: 16px 32px; background: #fff; border-bottom: 1px solid #ddd; }
  .controls label { font-weight: 600; font-size: 14px; }
  .controls input[type="file"] { font-size: 14px; }
  .stats { margin-left: auto; font-size: 13px; color: #666; }
  .filter-group { display: flex; gap: 8px; align-items: center; }
  .filter-group input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 240px; }

  .drop-zone { margin: 40px 32px; padding: 60px; border: 2px dashed #ccc; border-radius: 8px; text-align: center; color: #999; font-size: 16px; transition: all .2s; }
  .drop-zone.drag-over { border-color: #4a90d9; background: #eef4fb; color: #4a90d9; }

  .cards { padding: 24px 32px; display: flex; flex-direction: column; gap: 24px; }

  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; display: grid; grid-template-columns: 200px 1fr 1fr; }
  .card-image { background: #fafafa; display: flex; align-items: flex-start; justify-content: center; padding: 16px; }
  .card-image img { max-width: 100%; max-height: 200px; object-fit: contain; border-radius: 4px; }
  .card-image .no-img { color: #ccc; font-size: 13px; padding-top: 40px; }

  .card-section { padding: 20px; border-left: 1px solid #eee; }
  .card-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #999; margin-bottom: 8px; }

  .card-title { grid-column: 1 / -1; padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
  .card-title h2 { font-size: 16px; font-weight: 600; }
  .card-title .vendor { font-size: 12px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
  .card-title .status { font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: auto; }
  .card-title .status.success { background: #e6f9e6; color: #2a7a2a; }
  .card-title .status.error { background: #fce6e6; color: #a33; }

  .desc-content { font-size: 14px; line-height: 1.6; }
  .desc-content p { margin-bottom: 10px; }
  .desc-content ul { margin: 10px 0; padding-left: 20px; }
  .desc-content li { margin-bottom: 4px; }

  .original-text { font-size: 13px; line-height: 1.6; white-space: pre-wrap; color: #555; }

  @media (max-width: 900px) {
    .card { grid-template-columns: 1fr; }
    .card-image { max-height: 180px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Candy Description Review</h1>
  <p>Load the output CSV to review generated descriptions side-by-side with originals</p>
</div>

<div class="controls" id="controls" style="display:none;">
  <div class="filter-group">
    <input type="text" id="search" placeholder="Filter by title or vendor..." />
  </div>
  <div class="filter-group">
    <label><input type="checkbox" id="errorsOnly" /> Errors only</label>
  </div>
  <div class="stats" id="stats"></div>
</div>

<div class="drop-zone" id="dropZone">
  <p><strong>Drop your output CSV here</strong></p>
  <p style="margin-top:8px;">or <label style="color:#4a90d9;cursor:pointer;text-decoration:underline;">browse<input type="file" accept=".csv" id="fileInput" style="display:none;" /></label></p>
  <p style="margin-top:12px;font-size:13px;">Expected file: <code>output/products_with_descriptions.csv</code></p>
</div>

<div class="cards" id="cards"></div>

<script>
let allProducts = [];

function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  let row = [];

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') {
        current += '"';
        i++;
      } else if (ch === '"') {
        inQuotes = false;
      } else {
        current += ch;
      }
    } else {
      if (ch === '"') {
        inQuotes = true;
      } else if (ch === ',') {
        row.push(current);
        current = '';
      } else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
        row.push(current);
        current = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
        if (ch === '\r') i++;
      } else {
        current += ch;
      }
    }
  }
  if (current || row.length) {
    row.push(current);
    rows.push(row);
  }

  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.replace(/^\uFEFF/, '').trim());
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (r[idx] || '').trim(); });
    return obj;
  });
}

function renderCards(products) {
  const container = document.getElementById('cards');
  container.innerHTML = '';

  products.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';

    const isSuccess = (p.generation_status || '').startsWith('success');
    const statusClass = isSuccess ? 'success' : 'error';
    const statusText = isSuccess ? 'Success' : (p.generation_status || 'N/A');

    // Collect original descriptions
    const origParts = [];
    if (p.description) origParts.push(p.description);
    for (let j = 1; j <= 4; j++) {
      const key = `description_mini_0${j}`;
      if (p[key]) origParts.push(p[key]);
    }

    card.innerHTML = `
      <div class="card-title">
        <h2>${escHtml(p.Title || 'Untitled')}</h2>
        ${p.Vendor ? `<span class="vendor">${escHtml(p.Vendor)}</span>` : ''}
        <span class="status ${statusClass}">${escHtml(statusText)}</span>
      </div>
      <div class="card-image">
        ${p['Image Src'] ? `<img src="${escAttr(p['Image Src'])}" alt="${escAttr(p.Title || '')}" loading="lazy" />` : '<div class="no-img">No image</div>'}
      </div>
      <div class="card-section">
        <h3>New Description</h3>
        <div class="desc-content">${p.new_description || '<em style="color:#ccc;">No description generated</em>'}</div>
      </div>
      <div class="card-section">
        <h3>Original / Manufacturer Description</h3>
        <div class="original-text">${origParts.length ? escHtml(origParts.join('\n\n')) : '<em style="color:#ccc;">None provided</em>'}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function escAttr(s) {
  return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  const errorsOnly = document.getElementById('errorsOnly').checked;

  let filtered = allProducts;
  if (query) {
    filtered = filtered.filter(p =>
      (p.Title || '').toLowerCase().includes(query) ||
      (p.Vendor || '').toLowerCase().includes(query)
    );
  }
  if (errorsOnly) {
    filtered = filtered.filter(p => !(p.generation_status || '').startsWith('success'));
  }

  const total = allProducts.length;
  const success = allProducts.filter(p => (p.generation_status || '').startsWith('success')).length;
  const errors = total - success;
  document.getElementById('stats').textContent =
    `Showing ${filtered.length} of ${total} products | ${success} success, ${errors} errors`;

  renderCards(filtered);
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    allProducts = parseCSV(e.target.result);
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    applyFilters();
  };
  reader.readAsText(file);
}

// File input
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// Drag and drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

// Filters
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('errorsOnly').addEventListener('change', applyFilters);
</script>
</body>
</html>
