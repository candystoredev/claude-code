<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Batch Renamer — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
    }
    h1 { font-size: 1.3rem; color: #1a1a2e; margin-bottom: 0.4rem; }
    p { font-size: 0.85rem; color: #666; margin-bottom: 1.5rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 0.4rem; }
    input[type="password"] {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 0.95rem;
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { outline: none; border-color: #5c6ac4; }
    .btn {
      width: 100%;
      background: #5c6ac4;
      color: #fff;
      border: none;
      padding: 0.7rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #4a58b0; }
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 0.7rem 0.9rem;
      border-radius: 6px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Image Batch Renamer</h1>
    <p>Enter your password to continue.</p>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autofocus placeholder="Password">
      <button type="submit" class="btn">Sign in</button>
    </form>
  </div>
</body>
</html>
