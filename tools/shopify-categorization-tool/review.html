<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection Categorization Review</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }

  .header { background: #1a1a2e; color: #fff; padding: 20px 32px; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 13px; color: #aaa; margin-top: 4px; }

  .controls { display: flex; align-items: center; gap: 16px; padding: 16px 32px; background: #fff; border-bottom: 1px solid #ddd; position: sticky; top: 68px; z-index: 9; flex-wrap: wrap; }
  .controls label { font-weight: 600; font-size: 14px; }
  .stats { margin-left: auto; font-size: 13px; color: #666; }
  .filter-group { display: flex; gap: 8px; align-items: center; }
  .filter-group input[type="text"] { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; width: 240px; }
  .filter-group select { padding: 6px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }

  .btn { background: #5c6ac4; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #4a58b0; }
  .btn-sm { padding: 4px 10px; font-size: 12px; border-radius: 4px; }
  .btn-outline { background: #fff; color: #5c6ac4; border: 1px solid #5c6ac4; }
  .btn-outline:hover { background: #f0f1ff; }
  .btn-danger { background: #fff; color: #c62828; border: 1px solid #e57373; }
  .btn-danger:hover { background: #ffebee; }

  .drop-zone { margin: 40px 32px; padding: 60px; border: 2px dashed #ccc; border-radius: 8px; text-align: center; color: #999; font-size: 16px; transition: all .2s; }
  .drop-zone.drag-over { border-color: #5c6ac4; background: #eef4fb; color: #5c6ac4; }

  .cards { padding: 24px 32px; display: flex; flex-direction: column; gap: 20px; }

  .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.1); overflow: hidden; }
  .card-title { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .card-title h2 { font-size: 15px; font-weight: 600; }
  .card-title .vendor { font-size: 12px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 10px; }
  .card-title .handle { font-size: 12px; color: #999; font-family: 'SF Mono', 'Fira Code', monospace; margin-left: auto; }
  .card-title .collection-count { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: #e8eaf6; color: #3f51b5; }
  .card-title .store-badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .store-cs { background: #e8f5e9; color: #2e7d32; }
  .store-cd { background: #e3f2fd; color: #1565c0; }

  .card-body { padding: 16px 20px; }

  .tags { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .tag { display: inline-flex; align-items: center; gap: 4px; background: #e8f5e9; color: #2e7d32; padding: 4px 10px; border-radius: 14px; font-size: 13px; transition: all 0.15s; }
  .tag:hover { background: #c8e6c9; }
  .tag .tag-title { font-size: 11px; color: #66bb6a; margin-left: 2px; }
  .tag .remove-tag { cursor: pointer; color: #a5d6a7; font-size: 15px; line-height: 1; margin-left: 2px; transition: color 0.15s; }
  .tag .remove-tag:hover { color: #c62828; }

  .add-collection { position: relative; display: inline-block; }
  .add-btn { display: inline-flex; align-items: center; gap: 4px; background: #f5f5f5; color: #888; padding: 4px 10px; border-radius: 14px; font-size: 13px; cursor: pointer; border: 1px dashed #ccc; transition: all 0.15s; }
  .add-btn:hover { border-color: #5c6ac4; color: #5c6ac4; background: #f0f1ff; }

  .dropdown { position: absolute; top: 100%; left: 0; margin-top: 4px; background: #fff; border: 1px solid #ddd; border-radius: 6px; box-shadow: 0 4px 12px rgba(0,0,0,.15); width: 300px; max-height: 260px; z-index: 20; display: none; }
  .dropdown.open { display: block; }
  .dropdown-search { width: 100%; padding: 8px 12px; border: none; border-bottom: 1px solid #eee; font-size: 13px; outline: none; }
  .dropdown-list { max-height: 210px; overflow-y: auto; }

  .dropdown-item .di-handle { color: #333; }
  .dropdown-item .di-title { color: #999; font-size: 11px; }

  .no-collections { color: #999; font-style: italic; font-size: 13px; }

<div class="header">

// Combined collections (for display lookup) and per-store sorted lists
const ALL_COLLECTIONS = {...COLLECTIONS_BY_STORE.CS, ...COLLECTIONS_BY_STORE.CD};

function getCollectionListForStore(store) {
  const cols = COLLECTIONS_BY_STORE[store] || ALL_COLLECTIONS;
  return Object.entries(cols)
    .filter(([h]) => h !== 'frontpage' && h !== 'show-all-products')
    .sort((a, b) => a[1].localeCompare(b[1]));
}

let allProducts = [];
let editedHandles = new Set();

// Populate the collection filter dropdown with all collections from both stores
document.addEventListener('DOMContentLoaded', () => {
  const select = document.getElementById('collectionFilter');
  const allList = Object.entries(ALL_COLLECTIONS)
    .filter(([h]) => h !== 'frontpage' && h !== 'show-all-products')
    .sort((a, b) => a[1].localeCompare(b[1]));
  allList.forEach(([handle, title]) => {
    const opt = document.createElement('option');
    opt.value = handle;
    opt.textContent = title;
    select.appendChild(opt);
  });
});

function parseCSV(text) {
  const rows = [];
  let current = '';
  let inQuotes = false;
  let row = [];

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i + 1] === '"') { current += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { current += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === ',') { row.push(current); current = ''; }
      else if (ch === '\n' || (ch === '\r' && text[i + 1] === '\n')) {
        row.push(current); current = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
        if (ch === '\r') i++;
      } else { current += ch; }
    }
  }
  if (current || row.length) { row.push(current); rows.push(row); }

  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.replace(/^\uFEFF/, '').trim());
  return rows.slice(1).map(r => {
    const obj = {};
    headers.forEach((h, idx) => { obj[h] = (r[idx] || '').trim(); });
    return obj;
  });
}

function getCollections(product) {
  const raw = product['Custom Collections'] || '';
  if (!raw.trim()) return [];
  return raw.split(',').map(s => s.trim()).filter(Boolean);
}

function setCollections(product, collections) {
  product['Custom Collections'] = collections.join(', ');
}

function removeCollection(handle, collHandle) {
  const product = allProducts.find(p => p.Handle === handle);
  if (!product) return;
  const cols = getCollections(product).filter(c => c !== collHandle);
  setCollections(product, cols);
  editedHandles.add(handle);
  applyFilters();
}

function addCollection(handle, collHandle) {
  const product = allProducts.find(p => p.Handle === handle);
  if (!product) return;
  const cols = getCollections(product);
  if (!cols.includes(collHandle)) {
    cols.push(collHandle);
    setCollections(product, cols);
    editedHandles.add(handle);
  }
  applyFilters();
}

function renderCards(products) {
  const container = document.getElementById('cards');
  container.innerHTML = '';

  products.forEach(p => {
    const collections = getCollections(p);
    const isEdited = editedHandles.has(p.Handle);
    const card = document.createElement('div');
    card.className = 'card';

    // Title bar
    const titleDiv = document.createElement('div');
    titleDiv.className = 'card-title';
    const store = (p.CS_or_CD || '').toUpperCase();
    const storeClass = store === 'CD' ? 'store-cd' : 'store-cs';
    const storeLabel = store === 'CD' ? 'CD' : 'CS';
    titleDiv.innerHTML = `
      ${isEdited ? '<span class="edited-marker" title="Edited"></span>' : ''}
      <h2>${escHtml(p.Title || 'Untitled')}</h2>
      ${store ? `<span class="store-badge ${storeClass}">${storeLabel}</span>` : ''}
      ${p.Vendor ? `<span class="vendor">${escHtml(p.Vendor)}</span>` : ''}
      <span class="collection-count">${collections.length} collection${collections.length !== 1 ? 's' : ''}</span>
      <span class="handle">${escHtml(p.Handle)}</span>
    `;

    // Body with tags
    const bodyDiv = document.createElement('div');
    bodyDiv.className = 'card-body';

    const tagsDiv = document.createElement('div');
    tagsDiv.className = 'tags';

    if (collections.length === 0) {
      tagsDiv.innerHTML = '<span class="no-collections">No collections assigned</span>';
    } else {
      collections.forEach(c => {
        const title = ALL_COLLECTIONS[c] || c;
        const tag = document.createElement('span');
        tag.className = 'tag';
        tag.innerHTML = `${escHtml(c)} <span class="remove-tag" title="Remove">&times;</span>`;
        tag.querySelector('.remove-tag').addEventListener('click', () => removeCollection(p.Handle, c));
        tagsDiv.appendChild(tag);
      });
    }

    // Add button with dropdown
    const addDiv = document.createElement('div');
    addDiv.className = 'add-collection';
    addDiv.innerHTML = `
      <span class="add-btn">+ Add</span>
      <div class="dropdown">
        <input type="text" class="dropdown-search" placeholder="Search collections..." />
        <div class="dropdown-list"></div>
      </div>
    `;

    const addBtn = addDiv.querySelector('.add-btn');
    const dropdown = addDiv.querySelector('.dropdown');
    const searchInput = addDiv.querySelector('.dropdown-search');
    const listDiv = addDiv.querySelector('.dropdown-list');

    function populateDropdown(query) {
      listDiv.innerHTML = '';
      const existing = new Set(getCollections(p));
      const storeCollections = getCollectionListForStore(store);
      const filtered = storeCollections.filter(([h, t]) =>
        !existing.has(h) &&
        (h.includes(query.toLowerCase()) || t.toLowerCase().includes(query.toLowerCase()))
      ).slice(0, 20);

      if (filtered.length === 0) {
        listDiv.innerHTML = '<div class="dropdown-empty">No matches</div>';
      } else {
        filtered.forEach(([h, t]) => {
          const item = document.createElement('div');
          item.className = 'dropdown-item';
          item.innerHTML = `<span class="di-handle">${escHtml(h)}</span><span class="di-title">${escHtml(t)}</span>`;
          item.addEventListener('click', () => {
            addCollection(p.Handle, h);
            dropdown.classList.remove('open');
          });
          listDiv.appendChild(item);
        });
      }
    }

    addBtn.addEventListener('click', (e) => {
      // Close all other dropdowns first
      document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
      dropdown.classList.toggle('open');
      if (dropdown.classList.contains('open')) {
        searchInput.value = '';
        populateDropdown('');
        setTimeout(() => searchInput.focus(), 50);
      }
      e.stopPropagation();
    });

    searchInput.addEventListener('input', () => populateDropdown(searchInput.value));
    searchInput.addEventListener('click', (e) => e.stopPropagation());
    dropdown.addEventListener('click', (e) => e.stopPropagation());

    tagsDiv.appendChild(addDiv);
    bodyDiv.appendChild(tagsDiv);
    card.appendChild(titleDiv);
    card.appendChild(bodyDiv);
    container.appendChild(card);
  });
}

function applyFilters() {
  const query = document.getElementById('search').value.toLowerCase();
  const collFilter = document.getElementById('collectionFilter').value;
  const storeFilter = document.getElementById('storeFilter').value;

  let filtered = allProducts;
  if (storeFilter) {
    filtered = filtered.filter(p => (p.CS_or_CD || '').toUpperCase() === storeFilter);
  }
  if (query) {
    filtered = filtered.filter(p =>
      (p.Handle || '').toLowerCase().includes(query) ||
      (p.Title || '').toLowerCase().includes(query) ||
      (p.Vendor || '').toLowerCase().includes(query)
    );
  }
  if (collFilter === '__none') {
    filtered = filtered.filter(p => getCollections(p).length === 0);
  } else if (collFilter === '__edited') {
    filtered = filtered.filter(p => editedHandles.has(p.Handle));
  } else if (collFilter) {
    filtered = filtered.filter(p => getCollections(p).includes(collFilter));
  }

  const total = allProducts.length;
  const noCollections = allProducts.filter(p => getCollections(p).length === 0).length;
  const edited = editedHandles.size;
  const avgColl = total ? (allProducts.reduce((s, p) => s + getCollections(p).length, 0) / total).toFixed(1) : 0;
  document.getElementById('stats').textContent =
    `Showing ${filtered.length} of ${total} | Avg ${avgColl} collections/product | ${noCollections} uncategorized | ${edited} edited`;

  renderCards(filtered);
}

function downloadCSV() {
  let csv = 'Handle,Title,Vendor,CS_or_CD,Custom Collections\n';
  allProducts.forEach(p => {
    csv += `${csvEscape(p.Handle)},${csvEscape(p.Title)},${csvEscape(p.Vendor)},${csvEscape(p.CS_or_CD || '')},${csvEscape(p['Custom Collections'] || '')}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'products_categorized_reviewed.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(val) {
  if (!val) return '';
  if (val.includes(',') || val.includes('"') || val.includes('\n')) {
    return '"' + val.replace(/"/g, '""') + '"';
  }
  return val;
}

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    allProducts = parseCSV(e.target.result);
    editedHandles.clear();
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('controls').style.display = 'flex';
    applyFilters();
  };
  reader.readAsText(file);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// Close dropdowns when clicking outside
document.addEventListener('click', () => {
  document.querySelectorAll('.dropdown.open').forEach(d => d.classList.remove('open'));
});

// File input
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// Drag and drop
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

// Filters
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('storeFilter').addEventListener('change', applyFilters);
document.getElementById('collectionFilter').addEventListener('change', applyFilters);
</script>
</body>
</html>
